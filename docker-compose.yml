version: '3.8'

services:

  mongodb:
    image: mongo:7.0
    container_name: colistrack_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: delivery_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok", "--username", "admin", "--password", "admin123", "--authenticationDatabase", "admin"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    container_name: colistrack_backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      # Uses 'mongodb' (service name) as host — NOT localhost
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/delivery_db?authSource=admin
      JWT_SECRET: super_secret_jwt_key_change_in_production
      PORT: 5001
    ports:
      - "5001:5001"

  frontend:
    build: ./frontend
    container_name: colistrack_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  mongo-express:
    image: mongo-express:1.0.2
    container_name: colistrack_mongo_express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123

volumes:
  mongo_data:
    driver: local
